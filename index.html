<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Penal Code Systém v78</title>
    <style>
        :root {
            --bg-main: #0a0b0d;
            --bg-panel: #14161a;
            --accent: #ffcc00;
            --danger: #ff4444;
            --jail-color: #00aaff;
            --fine-color: #00ff88;
            --border: #202124;
        }

        body { background: var(--bg-main); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        b, strong { color: var(--accent) !important; font-weight: bold; }

        /* LOGIN */
        #loginOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://r2.fivemanage.com/L1FYmIx7KR3NO3g9xlt6b/pd.png'); 
            background-size: cover; background-position: center;
            z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .login-btn { padding: 20px 60px; background: var(--jail-color); border: none; color: #fff; font-weight: 900; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        #mainApp { display: none; width: 100%; height: 100%; }
        #leftPanel { flex: 3; display: flex; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
        #rightPanel { flex: 1.2; min-width: 420px; background: var(--bg-panel); display: flex; flex-direction: column; }

        .header-bar { padding: 20px 30px; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
        #lawsContainer { padding: 20px; overflow-y: auto; flex-grow: 1; background: #0c0d0f; }

        /* KARTY ZÁKONŮ */
        .law-card { background: var(--bg-panel); border: 1px solid var(--border); margin-bottom: 12px; border-radius: 8px; overflow: hidden; }
        .law-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; color: var(--accent); text-transform: uppercase; transition: 0.2s; }
        .law-header:hover { background: rgba(255, 204, 0, 0.05); }
        .law-content { display: none; padding: 15px 20px; border-top: 1px solid var(--border); background: #111317; }
        .law-card.active .law-content { display: block; }

        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; width: 75px; text-align: center; border-radius: 4px; font-weight: bold; outline: none; }
        .input-jail { border-color: var(--jail-color); }
        .input-fine { border-color: var(--fine-color); width: 90px; }
        .input-box:disabled { border-color: var(--danger) !important; color: var(--danger) !important; opacity: 1; cursor: not-allowed; background: rgba(255, 68, 68, 0.05); }

        /* PROTOKOL */
        .protocol-item { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid var(--jail-color); margin-bottom: 15px; position: relative; }
        .protocol-edit-input { background: transparent; border: none; border-bottom: 1px solid #333; color: inherit; width: 70px; text-align: center; font-weight: 900; outline: none; }
        
        .license-tag { background: var(--danger); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; text-transform: uppercase; margin-top: 5px; display: inline-block; }

        #historyModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 6000; justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-panel); width: 500px; max-height: 80vh; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        
        .summary-box { padding: 25px; background: #000; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <button class="login-btn" onclick="handleLogin()">Vstoupit do MDT</button>
</div>

<div id="mainApp">
    <div id="leftPanel">
        <div class="header-bar">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="margin:0; color:var(--accent);">SASP MDT - TERMINÁL v78</h2>
                <button onclick="toggleHistory(true)" style="background:var(--jail-color); color:#fff; border:none; padding:8px 20px; cursor:pointer; border-radius:4px; font-weight:bold;">HISTORIE</button>
            </div>
            <input type="text" id="searchInput" placeholder="Hledat zákon..." oninput="renderLaws()" style="width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:12px; border-radius:6px;">
        </div>
        <div id="lawsContainer"></div>
    </div>

    <div id="rightPanel">
        <div style="padding:20px; border-bottom:1px solid var(--border); font-weight:800; color:var(--accent);">AKTIVNÍ PROTOKOL</div>
        <div id="caseEntries" style="flex-grow:1; overflow-y:auto; padding:15px;"></div>
        <div class="summary-box">
            <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:15px; font-size:18px;">
                <span>CELKEM:</span>
                <span><span id="sumJail" style="color:var(--jail-color)">0</span> L | <span id="sumFine" style="color:var(--fine-color)">0</span> $</span>
            </div>
            <button onclick="saveCase()" style="width:100%; padding:18px; background:var(--jail-color); color:#fff; border:none; border-radius:6px; font-weight:900; cursor:pointer;">ULOŽIT PŘÍPAD</button>
        </div>
    </div>
</div>

<div id="historyModal">
    <div class="modal-content">
        <div class="modal-header" style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
            <h3 style="margin:0; color:var(--accent);">HISTORIE TRESTŮ</h3>
            <button onclick="toggleHistory(false)" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer;">✕</button>
        </div>
        <div id="historyList" style="padding:20px; overflow-y:auto;"></div>
    </div>
</div>

<script>
    let protocolData = [];
    let allLaws = [];
    let history = JSON.parse(localStorage.getItem('mdt_history_v78') || '[]');

    function handleLogin() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        loadLaws();
    }

    async function loadLaws() {
        // Simulace načtení z tresty.html - pro funkčnost v tomto okně používám vzorová data,
        // ale tvůj fetch zůstává zachován pro tvůj soubor.
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        allLaws = Array.from(temp.querySelectorAll('.law-item')).map(item => ({
            title: item.getAttribute('data-title'),
            subs: Array.from(item.querySelectorAll('.sub-line')).map(line => {
                const text = line.innerText;
                const rangeMatch = text.match(/(\d+)\s*-\s*(\d+)\s*let/);
                const singleMatch = text.match(/(\d+)\s*let/);
                const fineMatch = text.match(/do\s*výše\s*([\d.]+)\s*\$/);
                const isFixedFine = text.includes("ve výši");

                return {
                    html: line.innerHTML,
                    text: text,
                    minJ: rangeMatch ? parseInt(rangeMatch[1]) : (singleMatch ? parseInt(singleMatch[1]) : 0),
                    maxJ: rangeMatch ? parseInt(rangeMatch[2]) : (singleMatch ? parseInt(singleMatch[1]) : 99),
                    maxF: fineMatch ? parseInt(fineMatch[1].replace(/\./g, '')) : 999999,
                    fixedF: isFixedFine && fineMatch ? parseInt(fineMatch[1].replace(/\./g, '')) : null,
                    lic: text.toUpperCase().includes("ODEBRAT")
                };
            })
        }));
        renderLaws();
    }

    function renderLaws() {
        const container = document.getElementById('lawsContainer');
        const search = document.getElementById('searchInput').value.toLowerCase();

        container.innerHTML = allLaws.filter(l => l.title.toLowerCase().includes(search)).map((law, lIdx) => {
            const rows = law.subs.map((sub, sIdx) => `
                <div style="padding:10px 0; border-bottom:1px solid #222; display:flex; align-items:center; gap:10px;">
                    <div style="flex:1; font-size:12px;">
                        ${sub.html}
                        ${sub.lic ? `<br><span class="license-tag">ODEBRAT PRŮKAZ</span>` : ''}
                    </div>
                    <input type="number" class="input-box input-jail" id="j_${lIdx}_${sIdx}" placeholder="Let" oninput="if(this.value<0)this.value=0">
                    <input type="number" class="input-box input-fine" id="f_${lIdx}_${sIdx}" 
                        placeholder="$" oninput="if(this.value<0)this.value=0"
                        ${sub.fixedF !== null ? 'disabled' : ''} value="${sub.fixedF !== null ? sub.fixedF : ''}">
                    <button onclick="addItem(${lIdx}, ${sIdx})" style="background:var(--accent); border:none; padding:8px 12px; border-radius:4px; font-weight:bold; cursor:pointer;">+</button>
                </div>`).join('');
            return `<div class="law-card"><div class="law-header" onclick="this.parentElement.classList.toggle('active')"><span>${law.title}</span><span>▼</span></div><div class="law-content">${rows}</div></div>`;
        }).join('');
    }

    function addItem(lIdx, sIdx) {
        const sub = allLaws[lIdx].subs[sIdx];
        const jIn = document.getElementById(`j_${lIdx}_${sIdx}`);
        const fIn = document.getElementById(`f_${lIdx}_${sIdx}`);
        
        let jVal = parseInt(jIn.value) || 0;
        let fVal = parseInt(fIn.value) || 0;

        protocolData.push({ 
            id: Date.now(), 
            title: allLaws[lIdx].title, 
            jail: jVal, 
            fine: fVal, 
            lic: sub.lic 
        });
        renderProtocol();
    }

    function renderProtocol() {
        document.getElementById('caseEntries').innerHTML = protocolData.map(i => `
            <div class="protocol-item">
                <button onclick="removeItem(${i.id})" style="position:absolute; right:10px; top:10px; background:none; border:none; color:var(--danger); cursor:pointer;">✕</button>
                <div style="color:var(--accent); font-weight:900; font-size:13px;">${i.title}</div>
                <div style="margin-top:8px; display:flex; gap:15px;">
                    <span style="color:var(--jail-color); font-size:12px;">LET: 
                        <input type="number" class="protocol-edit-input" value="${i.jail}" onblur="updateItem(${i.id}, 'jail', this.value)">
                    </span>
                    <span style="color:var(--fine-color); font-size:12px;">POKUTA: 
                        <input type="number" class="protocol-edit-input" value="${i.fine}" onblur="updateItem(${i.id}, 'fine', this.value)"> $
                    </span>
                </div>
                ${i.lic ? `<div class="license-tag">ODEBRAT PRŮKAZ</div>` : ''}
            </div>`).join('');
        calculateSum();
    }

    function updateItem(id, field, val) {
        const item = protocolData.find(x => x.id === id);
        item[field] = parseInt(val) || 0;
        if(item[field] < 0) item[field] = 0;
        renderProtocol();
    }

    function removeItem(id) { protocolData = protocolData.filter(x => x.id !== id); renderProtocol(); }

    function calculateSum() {
        document.getElementById('sumJail').innerText = protocolData.reduce((a, b) => a + b.jail, 0);
        document.getElementById('sumFine').innerText = protocolData.reduce((a, b) => a + b.fine, 0).toLocaleString();
    }

    function toggleHistory(show) {
        document.getElementById('historyModal').style.display = show ? 'flex' : 'none';
        if(show) renderHistory();
    }

    function renderHistory() {
        document.getElementById('historyList').innerHTML = history.length ? history.slice().reverse().map(h => `
            <div style="background:#000; padding:12px; border-radius:6px; margin-bottom:10px; border-left:4px solid var(--accent);">
                <div style="font-size:10px; color:#555;">${h.date}</div>
                <div style="font-weight:900; display:flex; justify-content:space-between;">
                    <span>${h.jail} let</span>
                    <span style="color:var(--fine-color)">${h.fine.toLocaleString()} $</span>
                </div>
            </div>`).join('') : '<div style="text-align:center; color:#444;">Žádné záznamy</div>';
    }

    function saveCase() {
        if (!protocolData.length) return;
        history.push({ 
            date: new Date().toLocaleString(), 
            jail: protocolData.reduce((a, b) => a + b.jail, 0),
            fine: protocolData.reduce((a, b) => a + b.fine, 0)
        });
        localStorage.setItem('mdt_history_v78', JSON.stringify(history));
        protocolData = []; renderProtocol();
        alert("Případ uložen do historie.");
    }
</script>
</body>
</html>
