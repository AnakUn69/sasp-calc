<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Penal Code</title>
<style>
        :root {
            --bg: #000000;
            --card: #0c0c0c;
            --accent: #ffcc00;
            --border: #1a1a1a;
            --jail: #00aaff;
            --fine: #00ff88;
            --danger: #ff4444;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* LEVÝ PANEL - ŠIROKÝ */
        #leftPanel {
            flex: 3; /* Poměr 3:1 pro šířku */
            padding: 20px;
            overflow-y: auto;
        }

        /* Bílý nadpis se žlutou čarou */
        .main-header {
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
        }

        #searchInput {
            width: 100%;
            background: #111;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 12px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            outline: none;
            box-sizing: border-box;
        }

        .law-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .law-header {
            padding: 15px;
            cursor: pointer;
        }

        .law-title { color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .law-desc { color: #555; font-size: 11px; margin-top: 5px; }

        .law-content { display: none; padding: 0 15px 15px 15px; border-top: 1px solid #111; }
        .law-card.active .law-content { display: block; }

        /* ŘÁDKY - POLÍČKA NA BOKU */
        .sub-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #111;
        }

        .sub-text { flex: 1; font-size: 14px; color: #ccc; padding-right: 15px; line-height: 1.4; }
        .sub-text b { color: var(--accent); font-weight: bold; }

        /* Červené varování */
        .license-danger {
            color: var(--danger);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            margin-top: 4px;
            display: block;
        }

        .input-group { display: flex; gap: 8px; align-items: center; }
        .input-box {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 8px;
            width: 65px;
            text-align: center;
            border-radius: 4px;
        }

        .btn-add {
            background: var(--accent);
            border: none;
            color: #000;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        /* PRAVÝ PANEL - ZÚŽENÝ PROTOKOL */
        #rightPanel {
            flex: 1; /* Zúžení protokolu */
            min-width: 300px;
            background: var(--card);
            border-left: 2px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }

        .protocol-header {
            color: var(--accent);
            font-weight: bold;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        #caseEntries { flex-grow: 1; overflow-y: auto; }

        .summary-box { border-top: 2px solid var(--accent); padding-top: 15px; }
        .summary-line { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-bottom: 8px; }

        .btn-clear {
            width: 100%;
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn-clear:hover { background: var(--danger); color: #000; }
    </style>
</head>
<body>

<div id="leftPanel">
    <div class="main-header">POLICAJNÍ DATABAZE - PENAL CODE - GenK</div>
    <input type="text" id="searchInput" placeholder="Vyhledat paragraf..." oninput="doSearch()">
    <div id="lawsContainer"></div>
</div>

<div id="rightPanel">
    <div class="protocol-title">PROTOKOL</div>
    <div id="caseEntries"></div>
    <div class="summary-box">
        <div class="summary-line">Vězení: <span id="sumJail" style="color:var(--jail)">0 let</span></div>
        <div class="summary-line">Pokuta: <span id="sumFine" style="color:var(--fine)">0 $</span></div>
        <button class="btn-clear" onclick="clearAll()">VYMAZAT PŘÍPAD</button>
    </div>
</div>

<script>
    let protocolData = [];

    async function loadLaws() {
        const container = document.getElementById('lawsContainer');
        const res = await fetch('tresty.html?v=' + Date.now());
        const html = await res.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        container.innerHTML = "";
        temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
            const title = item.getAttribute('data-title');
            const desc = item.querySelector('.law-description')?.innerText || "";
            let rows = "";

            item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                const fF = line.getAttribute('data-fix-fine');
                const fJ = line.getAttribute('data-fix-jail');
                
                // Zpracování textu: tučný žlutý text a červený průkaz
                let textContent = line.innerHTML;
                if(textContent.includes("ODEBRAT Zbrojní Průkaz")) {
                    textContent = textContent.replace("ODEBRAT Zbrojní Průkaz", '<span class="license-danger">ODEBRAT Zbrojní Průkaz</span>');
                }

                rows += `
                    <div class="sub-row">
                        <div class="sub-text">${textContent}</div>
                        <div class="input-group">
                            <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" value="${fJ || ''}" placeholder="Let" onclick="event.stopPropagation()">
                            <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" value="${fF || ''}" placeholder="Suma" onclick="event.stopPropagation()">
                            <button class="btn-add" onclick="event.stopPropagation(); addItem('${title}', '${line.innerText}', ${lIdx}, ${rIdx})">+</button>
                        </div>
                    </div>`;
            });

            const card = document.createElement('div');
            card.className = 'law-card';
            card.innerHTML = `
                <div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                    <div class="law-title">${title}</div>
                    <div class="law-desc">${desc}</div>
                </div>
                <div class="law-content">${rows}</div>`;
            container.appendChild(card);
        });
    }

    function addItem(title, text, lIdx, rIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
        protocolData.push({ title, jail: j, fine: f });
        render();
    }

    function render() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let tj = 0, tf = 0;
        protocolData.forEach((i) => {
            tj += i.jail; tf += i.fine;
            cont.innerHTML += `<div style="padding:10px; border-bottom:1px solid #222;">
                <b style="color:var(--accent); font-size:12px;">${i.title}</b><br>
                <span style="color:var(--jail)">${i.jail} let</span> | <span style="color:var(--fine)">${i.fine} $</span>
            </div>`;
        });
        document.getElementById('sumJail').innerText = tj + " let";
        document.getElementById('sumFine').innerText = tf.toLocaleString() + " $";
    }

    function doSearch() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? "block" : "none";
        });
    }

    function clearAll() { protocolData = []; render(); }
    window.onload = loadLaws;
</script>

</body>
</html>
