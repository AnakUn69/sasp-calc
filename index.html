<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Policejní Databáze - GenK</title>
    <style>
        :root {
            --bg: #0d0d0d; --card: #151515; --accent: #ffcc00;
            --input-bg: #1a1a1a; --text: #e0e0e0; --border: #222;
            --danger: #ff4444; --jail: #4dabf7; --fine: #69db7c;
            --warning: #ffcc00;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        .main-content { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
        
        .header-area { padding: 20px 25px; border-bottom: 2px solid var(--border); background: #0a0a0a; }
        .main-title {
            color: #ffffff; font-size: 22px; font-weight: 900; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 15px; text-align: center;
            border-bottom: 3px solid var(--accent); padding-bottom: 12px;
        }

        #searchInput { 
            width: 100%; background: var(--input-bg); border: 1px solid #333; color: white;
            padding: 12px; border-radius: 4px; outline: none; border-left: 5px solid var(--accent);
        }

        .laws-list { flex: 1; padding: 15px 25px; overflow-y: auto; }
        .law-card { background: var(--card); border: 1px solid var(--border); margin-bottom: 10px; border-radius: 4px; overflow: hidden; }
        
        .law-header { 
            padding: 12px 15px; border-left: 4px solid var(--accent); cursor: pointer; 
            display: flex; align-items: center; gap: 15px; background: #111; 
        }
        .law-title { color: var(--accent); font-weight: bold; font-size: 13px; text-transform: uppercase; white-space: nowrap; }
        .law-header-desc { font-size: 11px; color: #666; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .law-content { display: none; background: #0c0c0c; padding: 5px 0; }
        .law-card.active .law-content { display: block; }
        
        .sub-row { padding: 12px 15px; border-top: 1px solid #1a1a1a; }
        .row-main { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .sub-text { flex: 1; font-size: 12px; color: #ccc; line-height: 1.4; }
        
        /* ČERVENÝ ŠTÍTEK PRO PRŮKAZY */
        .red-alert-bar { 
            display: inline-block; background: var(--danger); color: white; 
            font-weight: 900; font-size: 9px; padding: 2px 8px; margin-top: 8px; 
            text-transform: uppercase; border-radius: 2px; 
        }

        .input-group { display: flex; gap: 8px; align-items: center; }
        .input-box { 
            background: #111; border: 1px solid #333; color: white; padding: 8px; 
            width: 90px; border-radius: 3px; text-align: center; font-size: 12px; outline: none; transition: 0.2s;
        }
        .input-box.out-of-range {
            border-color: var(--warning) !important;
            color: var(--warning) !important;
            box-shadow: 0 0 5px rgba(255, 204, 0, 0.3);
        }
        .input-box[readonly] { background: #0a110a !important; border-color: #1b3d20 !important; color: #69db7c !important; cursor: not-allowed; }

        .btn-add { background: var(--accent); color: black; border: none; width: 35px; height: 35px; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 20px; }

        .sidebar { width: 380px; background: #080808; padding: 20px; display: flex; flex-direction: column; border-left: 1px solid var(--border); }
        .sidebar-title { color: var(--accent); text-align: center; font-size: 16px; margin-bottom: 20px; font-weight: bold; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .case-entries { flex: 1; overflow-y: auto; }
        .case-item { position: relative; background: #111; padding: 12px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #222; border-left: 3px solid var(--accent); }
        .btn-remove { position: absolute; top: 5px; right: 8px; background: transparent; color: #555; border: none; cursor: pointer; font-size: 18px; }
        
        .item-alert { background: var(--danger); color: white; text-align: center; font-weight: 800; font-size: 9px; padding: 3px; border-radius: 3px; margin-bottom: 8px; text-transform: uppercase; }
        .summary-box { background: #111; padding: 15px; border-radius: 6px; border: 1px solid var(--accent); margin-top: 15px; }
        .summary-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .btn-clear { width:100%; padding:10px; background:#1a1a1a; color:var(--danger); border:1px solid #333; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="header-area">
        <div class="main-title">POLICAJNÍ DATABAZE - PENAL CODE - GenK</div>
        <input type="text" id="searchInput" placeholder="Hledat v zákonech..." onkeyup="filterLaws()">
    </div>
    <div class="laws-list" id="lawsContainer"></div>
</div>

<div class="sidebar">
    <div class="sidebar-title">PROTOKOL</div>
    <div class="case-entries" id="caseEntries"></div>
    <div class="summary-box">
        <div id="licenseAlert" style="display:none; background: rgba(255, 68, 68, 0.1); border: 1px solid var(--danger); padding: 8px; margin-bottom: 12px; text-align: center; font-size: 10px; border-radius: 4px;">
            <b style="color:var(--danger)">ODEBRAT Z EVIDENCE:</b><br><span id="docsList" style="color:#ffcccc"></span>
        </div>
        <div class="summary-row"><span>VĚZENÍ:</span> <span id="totalJail" style="color:var(--jail)">0 let</span></div>
        <div class="summary-row"><span>POKUTA:</span> <span id="totalFine" style="color:var(--fine)">0 $</span></div>
        <button class="btn-clear" onclick="location.reload()">VYMAZAT PŘÍPAD</button>
    </div>
</div>

<script>
    let activeCaseItems = [];

    function getRange(text) {
        let clean = text.replace(/(\d)\.(\d{3})/g, '$1$2').replace(/<[^>]*>?/gm, '');
        let match = clean.match(/(\d+)\s*-\s*(\d+)/);
        if (match) return { min: parseInt(match[1]), max: parseInt(match[2]) };
        let maxMatch = clean.match(/(?:do|max)\s*(\d+)/i);
        if (maxMatch) return { min: 0, max: parseInt(maxMatch[1]) };
        return null;
    }

    function validateInput(el, min, max) {
        let val = parseInt(el.value);
        if (!isNaN(val) && (val < min || val > max)) el.classList.add('out-of-range');
        else el.classList.remove('out-of-range');
    }

    async function loadLaws() {
        const container = document.getElementById('lawsContainer');
        const response = await fetch('tresty.html?v=' + Date.now());
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
            const title = item.getAttribute('data-title') || "Paragraf";
            const desc = item.querySelector('.law-description')?.innerText || "";
            let rows = "";

            item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                const fixFine = line.getAttribute('data-fix-fine');
                const fixJail = line.getAttribute('data-fix-jail');
                const innerH = line.innerHTML;
                
                const jailRange = getRange(innerH.includes('let') || innerH.includes('rok') ? innerH : "");
                const fineRange = getRange(innerH.includes('$') ? innerH : "");

                // DETEKCE PRŮKAZŮ PRO ŠTÍTEK
                let alerts = [];
                if (innerH.toUpperCase().includes("ŘIDIČ")) alerts.push("ODEBRAT ŘIDIČSKÝ PRŮKAZ");
                if (innerH.toUpperCase().includes("ZBROJNÍ")) alerts.push("ODEBRAT ZBROJNÍ PRŮKAZ");

                rows += `
                <div class="sub-row">
                    <div class="row-main">
                        <div class="sub-text">${innerH}</div>
                        <div class="input-group">
                            <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" 
                                value="${fixJail || ''}" placeholder="${jailRange ? jailRange.min+'-'+jailRange.max : 'Let'}" 
                                ${fixJail !== null ? 'readonly' : ''}
                                oninput="validateInput(this, ${jailRange?.min || 0}, ${jailRange?.max || 999})">
                            <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" 
                                value="${fixFine || ''}" placeholder="${fineRange ? fineRange.min+'-'+fineRange.max : 'Suma'}" 
                                ${fixFine !== null ? 'readonly' : ''}
                                oninput="validateInput(this, ${fineRange?.min || 0}, ${fineRange?.max || 999999})">
                            <button class="btn-add" onclick="addToCase('${title}', '${line.innerText.replace(/'/g,"\\'")}', ${lIdx}, ${rIdx})">+</button>
                        </div>
                    </div>
                    ${alerts.map(a => `<div class="red-alert-bar">${a}</div>`).join("")}
                </div>`;
            });

            const card = document.createElement('div');
            card.className = 'law-card';
            card.innerHTML = `<div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                <div class="law-title">${title}</div><div class="law-header-desc">${desc}</div>
            </div><div class="law-content">${rows}</div>`;
            container.appendChild(card);
        });
    }

    function addToCase(title, fullText, lIdx, rIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
        if (j === 0 && f === 0) return;

        let docs = [];
        if (fullText.toUpperCase().includes("ŘIDIČ")) docs.push("ŘP");
        if (fullText.toUpperCase().includes("ZBROJNÍ")) docs.push("ZP");

        activeCaseItems.push({ title, jail: j, fine: f, docs });
        renderCase();
    }

    function renderCase() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let jT = 0, fT = 0, dS = new Set();
        activeCaseItems.forEach((i, idx) => {
            jT += i.jail; fT += i.fine; i.docs.forEach(d => dS.add(d));
            const div = document.createElement('div');
            div.className = 'case-item';
            div.innerHTML = `<button class="btn-remove" onclick="removeEntry(${idx})">×</button>
                <span class="item-title" style="color:var(--accent); font-weight:bold; font-size:11px;">${i.title}</span>
                ${i.docs.map(d => `<div class="item-alert">ODEBRAT ${d}</div>`).join("")}
                <div class="item-vals" style="font-weight:bold; font-size:11px; border-top:1px solid #222; padding-top:8px; display:flex; justify-content:space-between;">
                    <span style="color:var(--jail)">${i.jail} let</span><span style="color:var(--fine)">${i.fine.toLocaleString()} $</span>
                </div>`;
            cont.appendChild(div);
        });
        document.getElementById('totalJail').innerText = jT + " let";
        document.getElementById('totalFine').innerText = fT.toLocaleString() + " $";
        document.getElementById('licenseAlert').style.display = dS.size > 0 ? 'block' : 'none';
        document.getElementById('docsList').innerText = Array.from(dS).join(", ");
    }

    function removeEntry(idx) { activeCaseItems.splice(idx, 1); renderCase(); }
    function filterLaws() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none");
    }
    window.onload = loadLaws;
</script>
</body>
</html>
