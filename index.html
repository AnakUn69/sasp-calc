        body {

            padding: 12px;
            border-radius: 4px;

            outline: none;
            border-left: 4px solid var(--accent);
        }

        .law-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            padding: 15px;
            cursor: pointer;
        }

        .law-card.active { border-color: var(--accent); }
        .law-title { color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .law-description { color: #555; font-size: 11px; margin-top: 4px; }
        .law-content { display: none; margin-top: 15px; border-top: 1px solid #1a1a1a; padding-top: 10px; }
        .law-card.active .law-content { display: block; }

    function analyzeLimits(text, unit) {
        let cleanText = text.replace(/(\d)\.(\d{3})/g, '$1$2');
        let regex = new RegExp(`(\\d+)\\s*(${unit === 'let' ? 'let|roků' : '\\$'})`, 'gi');
        let matches = [...cleanText.matchAll(regex)].map(m => m[1]);
        let low = text.toLowerCase();
        let isRange = low.includes("od") || low.includes("do") || low.includes("až") || low.includes("sazba") || text.includes("-") || text.includes("–");

        if (isRange || matches.length > 1) {
            let placeholderText = matches.length >= 2 ? `${matches[0]}-${matches[1]}` : (matches[0] ? `max ${matches[0]}` : (unit === 'let' ? 'Let' : 'Suma'));
            return { type: 'range', value: '', placeholder: placeholderText };
        } 
        if (matches.length === 1) {
            return { type: 'fixed', value: matches[0], placeholder: '' };
        }
        return { type: 'empty', value: '', placeholder: unit === 'let' ? 'Let' : 'Pokuta' };
    }

        function renderCase() {
