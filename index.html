<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP - Penal Code</title>
    <style>
        :root {
            --bg: #0d0d0d; --card: #151515; --accent: #ffcc00;
            --input-bg: #1a1a1a; --text: #e0e0e0; --border: #222;
            --danger: #ff4444; --jail: #4dabf7; --fine: #69db7c;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* HLAVNÍ ČÁST */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
        .header-area { padding: 30px 30px 10px 30px; }
        #searchInput { width: 100%; background: var(--input-bg); border: 1px solid #333; color: white; padding: 14px 20px; border-radius: 4px; font-size: 15px; outline: none; border-left: 4px solid var(--accent); }

        .laws-list { flex: 1; padding: 15px 30px 30px 30px; overflow-y: auto; }
        .law-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        .law-header { padding: 15px 20px; border-left: 4px solid var(--accent); background: #111; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .law-title { color: var(--accent); font-weight: bold; font-size: 17px; text-transform: uppercase; }
        .law-content { display: none; background: #0c0c0c; }
        .law-card.active .law-content { display: block; }
        
        .sub-row { display: flex; flex-direction: column; padding: 15px 20px; border-top: 1px solid #1a1a1a; }
        .row-top { display: flex; width: 100%; align-items: flex-start; }
        .sub-text { flex: 1; font-size: 14px; color: #ccc; line-height: 1.5; }

        /* ČERVENÁ LIŠTA V ZÁKONECH */
        .red-alert-bar { 
            background: var(--danger); color: white; text-align: center; 
            font-weight: 900; font-size: 11px; padding: 4px; border-radius: 4px; 
            margin-top: 10px; text-transform: uppercase; width: 100%;
        }

        .input-wrapper { display: flex; flex-direction: column; align-items: center; margin-left: 15px; }
        .input-label { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
        .input-box { background: #111; border: 1px solid #333; color: white; padding: 8px; width: 100px; border-radius: 4px; text-align: center; font-size: 13px; }
        .input-box[readonly] { border-color: #2b4d2e; color: var(--fine); background: #0f1a10; cursor: not-allowed; font-weight: bold; }

        .btn-add { background: var(--accent); color: black; border: none; width: 40px; height: 38px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 15px; align-self: flex-end; }

        /* SIDEBAR / PROTOKOL */
        .sidebar { width: 380px; background: #080808; padding: 25px; display: flex; flex-direction: column; }
        .case-entries { flex: 1; overflow-y: auto; }
        
        .case-item { 
            position: relative; background: #111; padding: 15px; border-radius: 8px; margin-bottom: 12px; 
            border: 1px solid #222; font-size: 13px; 
        }
        .btn-remove { position: absolute; top: 10px; right: 10px; background: transparent; color: #555; border: none; cursor: pointer; font-size: 20px; }
        .btn-remove:hover { color: var(--danger); }
        
        .item-alert-bar { background: var(--danger); color: white; text-align: center; font-weight: 800; font-size: 11px; padding: 5px; border-radius: 4px; margin: 8px 0; text-transform: uppercase; }
        .item-stats { display: flex; gap: 10px; font-weight: bold; }

        /* SOUHRN DOLE */
        .summary-box { background: #111; padding: 20px; border-radius: 8px; border: 1px solid var(--accent); margin-top: 20px; }
        .final-alert { background: rgba(255, 68, 68, 0.15); border: 1px solid var(--danger); border-radius: 6px; padding: 12px; margin-bottom: 15px; text-align: center; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="header-area">
        <h1 style="color:var(--text); font-size: 24px; margin: 0 0 20px 0;">POLICEJNÍ DATABÁZE</h1>
        <input type="text" id="searchInput" placeholder="Vyhledat paragraf nebo trestný čin..." onkeyup="filterLaws()">
    </div>
    <div class="laws-list" id="lawsContainer"></div>
</div>

<div class="sidebar">
    <h1 style="color:var(--accent); text-align:center; letter-spacing:4px; margin-bottom:20px;">PROTOKOL</h1>
    <div class="case-entries" id="caseEntries"></div>
    <div class="summary-box">
        <div id="licenseAlert" class="final-alert" style="display:none;">
            <div style="color:var(--danger); font-weight:900; font-size:12px; border-bottom:1px solid rgba(255,68,68,0.3); padding-bottom:5px; margin-bottom:5px;">ODEBRAT Z EVIDENCE:</div>
            <div id="docsList" style="color:#ffcccc; font-size:11px;"></div>
        </div>
        <div class="summary-row"><span>VĚZENÍ:</span> <span id="totalJail" style="color:var(--jail)">0 let</span></div>
        <div class="summary-row"><span>POKUTA:</span> <span id="totalFine" style="color:var(--fine)">0 $</span></div>
        <button style="width:100%; padding:15px; background:#1a1a1a; color:var(--danger); border:1px solid #333; cursor:pointer; font-weight:bold; margin-top:5px;" onclick="location.reload()">NOVÝ PŘÍPAD</button>
    </div>
</div>

<script>
    let activeCaseItems = [];

    // Formátování textu a tvorba červených lišt
    function formatLawText(html) {
        if (!html.includes("ODEBRAT")) return `<div class="row-top"><div class="sub-text">${html}</div>`;
        
        let cleanText = html.split("ODEBRAT")[0];
        let alertMatch = html.match(/ODEBRAT\s+([^<]+)/g);
        let alertHtml = alertMatch ? alertMatch.map(m => `<div class="red-alert-bar">${m}</div>`).join("") : "";
        
        return `<div class="row-top"><div class="sub-text">${cleanText}</div>` + `</div>${alertHtml}`;
    }

    function analyzeLimits(text, unit) {
        const regex = new RegExp(`(\\d+[.\\d]*)\\s*${unit.replace('$', '\\$')}`, 'g');
        const matches = [...text.matchAll(regex)].map(m => m[1]);
        const lower = text.toLowerCase();
        const isRange = lower.includes("od") || lower.includes("do") || lower.includes("až") || text.includes("-");

        if (matches.length >= 2 || (matches.length === 1 && isRange)) {
            return { type: 'range', placeholder: matches.length >= 2 ? `${matches[0]}-${matches[1]}` : `max ${matches[0]}`, value: '' };
        } 
        if (matches.length === 1) return { type: 'fixed', placeholder: '', value: matches[0].replace(/\./g, '') };
        return { type: 'empty', placeholder: unit === 'let' ? 'Let' : 'Pokuta', value: '' };
    }

    async function loadLaws() {
        const container = document.getElementById('lawsContainer');
        const response = await fetch('tresty.html?v=' + Date.now());
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
            const title = item.getAttribute('data-title');
            let rows = "";

            item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                const jail = analyzeLimits(line.innerText, 'let');
                const fine = analyzeLimits(line.innerText, '$');

                rows += `
                    <div class="sub-row">
                        <div style="display:flex; width:100%;">
                            <div class="sub-text">${line.innerHTML.split("ODEBRAT")[0]}</div>
                            <div class="input-wrapper">
                                <span class="input-label">VĚZENÍ</span>
                                <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" value="${jail.value}" placeholder="${jail.placeholder}" ${jail.type === 'fixed' ? 'readonly' : ''}>
                            </div>
                            <div class="input-wrapper">
                                <span class="input-label">POKUTA</span>
                                <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" value="${fine.value}" placeholder="${fine.placeholder}" ${fine.type === 'fixed' ? 'readonly' : ''}>
                            </div>
                            <button class="btn-add" onclick="addToCase('${title}', '${line.innerText.replace(/'/g,"")}', ${lIdx}, ${rIdx})">+</button>
                        </div>
                        ${line.innerHTML.includes("ODEBRAT") ? line.innerHTML.match(/ODEBRAT\s+([^<.]+)/g).map(m => `<div class="red-alert-bar">${m}</div>`).join("") : ""}
                    </div>`;
            });

            const card = document.createElement('div');
            card.className = 'law-card';
            card.innerHTML = `<div class="law-header" onclick="this.parentElement.classList.toggle('active')"><div class="law-title">${title}</div><div>▼</div></div><div class="law-content">${rows}</div>`;
            container.appendChild(card);
        });
    }

    function addToCase(title, text, lIdx, rIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
        const docs = [];
        if (text.includes("ŘIDIČ")) docs.push("ODEBRAT ŘIDIČSKÉ OPRÁVNĚNÍ");
        if (text.includes("ZBROJNÍ")) docs.push("ODEBRAT ZBROJNÍ PRŮKAZ");

        activeCaseItems.push({ id: Date.now(), title, text, jail: j, fine: f, docs });
        renderCase();
    }

    function renderCase() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let jTot = 0, fTot = 0, allDocs = new Set();

        activeCaseItems.forEach(item => {
            jTot += item.jail; fTot += item.fine;
            const entry = document.createElement('div');
            entry.className = 'case-item';
            
            let alerts = item.docs.map(d => `<div class="item-alert-bar">${d}</div>`).join("");
            item.docs.forEach(d => allDocs.add(d.replace("ODEBRAT ", "")));

            entry.innerHTML = `
                <button class="btn-remove" onclick="removeEntry(${item.id})">×</button>
                <b style="color:var(--accent)">${item.title}</b>
                <div style="color:#888; font-size:11px; margin-top:4px;">${item.text.split("ODEBRAT")[0].substring(0,80)}...</div>
                ${alerts}
                <div class="item-stats">
                    <span style="color:var(--jail)">${item.jail} let</span> | <span style="color:var(--fine)">${item.fine} $</span>
                </div>`;
            cont.appendChild(entry);
        });

        document.getElementById('totalJail').innerText = jTot + " let";
        document.getElementById('totalFine').innerText = fTot.toLocaleString() + " $";
        document.getElementById('licenseAlert').style.display = allDocs.size > 0 ? 'block' : 'none';
        document.getElementById('docsList').innerText = Array.from(allDocs).join(", ");
    }

    function removeEntry(id) {
        activeCaseItems = activeCaseItems.filter(i => i.id !== id);
        renderCase();
    }

    function filterLaws() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none");
    }

    window.onload = loadLaws;
</script>
</body>
</html>
