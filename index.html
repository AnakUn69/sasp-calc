<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SASP - Penal Code</title>
    </head>
<body>

<div id="lawsContainer"></div>
<div id="caseEntries"></div>
<div id="totalJail">0 let</div>
<div id="totalFine">0 $</div>
<div id="licenseAlert" style="display:none;">ODEBRAT: <span id="docsList"></span></div>

<script>
    let activeCaseItems = [];

    // Funkce pro extrakci čísel z textu (opraveno pro lepší stabilitu)
    function getRange(text) {
        if (!text) return null;
        let clean = text.replace(/(\d)\.(\d{3})/g, '$1$2').replace(/<[^>]*>?/gm, '');
        let match = clean.match(/(\d+)\s*-\s*(\d+)/);
        if (match) return { min: parseInt(match[1]), max: parseInt(match[2]) };
        let maxMatch = clean.match(/(?:do|max|výše)\s*(\d+)/i);
        if (maxMatch) return { min: 0, max: parseInt(maxMatch[1]) };
        return null;
    }

    function validateInput(el, min, max) {
        let val = parseInt(el.value);
        if (!isNaN(val) && (val < min || val > max)) el.classList.add('out-of-range');
        else el.classList.remove('out-of-range');
    }

    async function loadLaws() {
        const container = document.getElementById('lawsContainer');
        // Přidání timestampu proti cachování
        const response = await fetch('tresty.html?v=' + Date.now());
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        container.innerHTML = ""; // Vyčištění kontejneru před načtením

        temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
            const title = item.getAttribute('data-title') || "Paragraf";
            const desc = item.querySelector('.law-description')?.innerText || "";
            let rows = "";

            item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                const fixFine = line.getAttribute('data-fix-fine');
                const fixJail = line.getAttribute('data-fix-jail');
                const innerH = line.innerHTML;
                
                // Detekce rozsahů přímo z HTML obsahu
                const hasJail = innerH.includes('let') || innerH.includes('rok') || innerH.includes('měsíc');
                const jailRange = getRange(hasJail ? innerH : "");
                const fineRange = getRange(innerH.includes('$') ? innerH : "");

                // Detekce průkazů pro varovné štítky
                let alerts = [];
                if (innerH.toUpperCase().includes("ŘIDIČ")) alerts.push("ODEBRAT ŘIDIČSKÝ PRŮKAZ");
                if (innerH.toUpperCase().includes("ZBROJNÍ")) alerts.push("ODEBRAT ZBROJNÍ PRŮKAZ");

                // Generování řádku s tlačítkem +
                // DŮLEŽITÉ: Posíláme line.innerText, aby se v addToCase dalo pracovat s textem varianty
                rows += `
                <div class="sub-row">
                    <div class="row-main">
                        <div class="sub-text">${innerH}</div>
                        <div class="input-group">
                            <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" 
                                value="${fixJail || ''}" 
                                placeholder="${jailRange ? jailRange.min+'-'+jailRange.max : 'Let'}" 
                                ${fixJail !== null ? 'readonly' : ''}
                                oninput="validateInput(this, ${jailRange?.min || 0}, ${jailRange?.max || 999})">
                            <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" 
                                value="${fixFine || ''}" 
                                placeholder="${fineRange ? fineRange.min+'-'+fineRange.max : 'Suma'}" 
                                ${fixFine !== null ? 'readonly' : ''}
                                oninput="validateInput(this, ${fineRange?.min || 0}, ${fineRange?.max || 999999})">
                            <button class="btn-add" onclick="addToCase('${title}', '${line.innerText.replace(/'/g,"\\'")}', ${lIdx}, ${rIdx})">+</button>
                        </div>
                    </div>
                    ${alerts.map(a => `<div class="red-alert-bar">${a}</div>`).join("")}
                </div>`;
            });

            const card = document.createElement('div');
            card.className = 'law-card';
            card.innerHTML = `
                <div class="law-header" onclick="this.parentElement.classList.toggle('active')">
                    <div class="law-title">${title}</div>
                    <div class="law-header-desc">${desc}</div>
                </div>
                <div class="law-content">${rows}</div>`;
            container.appendChild(card);
        });
    }

    // OPRAVENÁ FUNKCE - Teď už propisuje i konkrétní text varianty
    function addToCase(title, fullText, lIdx, rIdx) {
        const jInput = document.getElementById(`j_${lIdx}_${rIdx}`);
        const fInput = document.getElementById(`f_${lIdx}_${rIdx}`);
        
        const j = parseInt(jInput.value) || 0;
        const f = parseInt(fInput.value) || 0;

        // Validace: Pokud je vše 0, nepustíme to dál (pokud to není specifický trestný čin bez pokuty)
        if (j === 0 && f === 0 && !fullText.includes("odnětím svobody")) return;

        let docs = [];
        if (fullText.toUpperCase().includes("ŘIDIČ")) docs.push("ŘP");
        if (fullText.toUpperCase().includes("ZBROJNÍ")) docs.push("ZP");

        // BRUTÁLNÍ EXTRAKCE: Vezmeme jen začátek textu (např. "a) je přestupek")
        // To zajistí, že v protokolu uvidíš, o jakou variantu šlo.
        const shortDesc = fullText.split(',')[0].trim();

        activeCaseItems.push({ 
            title: title, 
            subText: shortDesc,
            jail: j, 
            fine: f, 
            docs 
        });
        
        renderCase();
        
        // Vizuální potvrzení přidání (volitelné)
        jInput.classList.add('added-success');
        setTimeout(() => jInput.classList.remove('added-success'), 500);
    }

    // OPRAVENÝ RENDER - Teď vypisuje i sub-text
    function renderCase() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let jT = 0, fT = 0, dS = new Set();

        activeCaseItems.forEach((i, idx) => {
            jT += i.jail; 
            fT += i.fine; 
            i.docs.forEach(d => dS.add(d));

            const div = document.createElement('div');
            div.className = 'case-item';
            div.innerHTML = `
                <button class="btn-remove" onclick="removeEntry(${idx})">×</button>
                <div style="display:flex; flex-direction:column; gap:2px; flex:1;">
                    <span class="item-title" style="color:var(--accent); font-weight:bold; font-size:11px;">${i.title}</span>
                    <span class="item-subtext" style="font-size:10px; color:#aaa; font-style:italic;">${i.subText}</span>
                </div>
                ${i.docs.map(d => `<div class="item-alert">ODEBRAT ${d}</div>`).join("")}
                <div class="item-vals" style="font-weight:bold; font-size:11px; border-top:1px solid #333; margin-top:5px; padding-top:5px; display:flex; justify-content:space-between; width:100%;">
                    <span style="color:var(--jail)">${i.jail} let</span>
                    <span style="color:var(--fine)">${i.fine.toLocaleString()} $</span>
                </div>`;
            cont.appendChild(div);
        });

        // Aktualizace celkových součtů
        document.getElementById('totalJail').innerText = jT + " let";
        document.getElementById('totalFine').innerText = fT.toLocaleString() + " $";
        
        const licenseAlert = document.getElementById('licenseAlert');
        if (licenseAlert) {
            licenseAlert.style.display = dS.size > 0 ? 'block' : 'none';
            document.getElementById('docsList').innerText = Array.from(dS).join(", ");
        }
    }

    function removeEntry(idx) { 
        activeCaseItems.splice(idx, 1); 
        renderCase(); 
    }

    function filterLaws() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
        });
    }

    window.onload = loadLaws;
</script>

</body>
</html>
