<body>

<div id="lawsContainer"></div>

<div id="caseProtocol">
    <div class="protocol-title">AKTIVNÍ PROTOKOL</div>
    <div id="caseEntries"></div>
    <div class="summary-box">
        <div class="summary-line">Celkem vězení: <span id="totalJail" style="color:var(--jail)">0 let</span></div>
        <div class="summary-line">Celkem pokuta: <span id="totalFine" style="color:var(--fine)">0 $</span></div>
    </div>
</div>

<script>
    let activeCaseItems = [];

    // Funkce pro automatické zjištění rozsahu (placeholderu)
    function getPlaceholder(text, unit) {
        let cleanText = text.replace(/<[^>]*>?/gm, '').replace(/(\d)\.(\d{3})/g, '$1$2');
        let regex = new RegExp(`(\\d+)\\s*-\\s*(\\d+)\\s*${unit === 'let' ? 'let|roků' : '\\$' }`, 'i');
        let matches = cleanText.match(regex);
        if (matches) return `${matches[1]}-${matches[2]}`;
        let maxMatch = cleanText.match(/(?:do|max)\s*(\d+)/i);
        if (maxMatch) return `max ${maxMatch[1]}`;
        return unit === 'let' ? 'Let' : 'Suma';
    }

    async function loadLaws() {
        const container = document.getElementById('lawsContainer');
        const response = await fetch('tresty.html?v=' + Date.now());
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;

        temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
            const title = item.getAttribute('data-title') || "Paragraf";
            const desc = item.querySelector('.law-description')?.innerText || "";
            let rows = "";

            item.querySelectorAll('.sub-line').forEach((line, rIdx) => {
                const fixFine = line.getAttribute('data-fix-fine');
                const fixJail = line.getAttribute('data-fix-jail');
                const innerH = line.innerHTML;
                
                const jPlace = fixJail !== null ? fixJail : getPlaceholder(innerH, 'let');
                const fPlace = fixFine !== null ? fixFine : getPlaceholder(innerH, '$');

                rows += `
                <div class="sub-row">
                    <div class="sub-text">${innerH}</div>
                    <div class="input-group">
                        <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" value="${fixJail || ''}" placeholder="${jPlace}" ${fixJail !== null ? 'readonly' : ''}>
                        <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" value="${fixFine || ''}" placeholder="${fPlace}" ${fixFine !== null ? 'readonly' : ''}>
                        <button class="btn-add" onclick="event.stopPropagation(); addToCase('${title}', '${line.innerText.replace(/'/g,"\\'")}', ${lIdx}, ${rIdx})">+</button>
                    </div>
                </div>`;
            });

            const card = document.createElement('div');
            card.className = 'law-card';
            card.onclick = function() { this.classList.toggle('active'); };
            card.innerHTML = `
                <div class="law-title">${title}</div>
                <div class="law-description">${desc}</div>
                <div class="law-content">${rows}</div>`;
            container.appendChild(card);
        });
    }

    function addToCase(title, fullText, lIdx, rIdx) {
        const jVal = document.getElementById(`j_${lIdx}_${rIdx}`).value;
        const fVal = document.getElementById(`f_${lIdx}_${rIdx}`).value;
        const j = parseInt(jVal) || 0;
        const f = parseInt(fVal) || 0;

        if (j === 0 && f === 0) return;

        let docs = [];
        if (fullText.toUpperCase().includes("ŘIDIČ")) docs.push("ŘP");
        if (fullText.toUpperCase().includes("ZBROJNÍ")) docs.push("ZP");

        activeCaseItems.push({ 
            title: title, 
            desc: fullText.split(')')[0] + ") " + fullText.split(')')[1]?.split('.')[0].trim(),
            jail: j, 
            fine: f, 
            docs: docs 
        });
        renderCase();
    }

    function renderCase() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let jT = 0, fT = 0;

        activeCaseItems.forEach((i, idx) => {
            jT += i.jail; fT += i.fine;
            const div = document.createElement('div');
            div.className = 'case-item';
            div.innerHTML = `
                <button class="btn-remove" onclick="removeEntry(${idx})">×</button>
                <div class="item-title" style="font-size:12px;">${i.title}</div>
                <div style="font-size:10px; color:#777; margin-top:3px;">${i.desc}</div>
                <div class="item-vals">
                    <span style="color:var(--jail)">${i.jail} let</span>
                    <span style="color:var(--fine)">${i.fine.toLocaleString()} $</span>
                </div>`;
            cont.appendChild(div);
        });

        document.getElementById('totalJail').innerText = jT + " let";
        document.getElementById('totalFine').innerText = fT.toLocaleString() + " $";
    }

    function removeEntry(idx) { activeCaseItems.splice(idx, 1); renderCase(); }

    window.onload = loadLaws;
</script>
</body>
</html>
