<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASP - Penal Code</title>
    <style>
        :root {
            --bg: #0d0d0d; --card: #151515; --accent: #ffcc00;
            --input-bg: #1a1a1a; --text: #e0e0e0; --text-muted: #888;
            --border: #222; --danger: #ff4444; --jail: #4dabf7; --fine: #69db7c;
            --side-padding: 30px;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
        .header-area { padding: 30px var(--side-padding) 10px var(--side-padding); }
        .main-title { color: var(--text); font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 2px solid var(--accent); display: inline-block; }
        #searchInput { width: 100%; background: var(--input-bg); border: 1px solid #333; color: white; padding: 14px 20px; border-radius: 4px; font-size: 15px; outline: none; border-left: 4px solid var(--accent); }

        .laws-list { flex: 1; padding: 15px var(--side-padding) 30px var(--side-padding); overflow-y: auto; }
        .law-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        .law-header { padding: 15px 20px; border-left: 4px solid var(--accent); background: #111; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .law-title { color: var(--accent); font-weight: bold; font-size: 17px; text-transform: uppercase; }
        .law-content { display: none; background: #0c0c0c; }
        .law-card.active .law-content { display: block; }
        
        .sub-row { display: flex; align-items: flex-start; padding: 15px 20px; border-top: 1px solid #1a1a1a; }
        .sub-text { flex: 1; font-size: 14px; color: #ccc; line-height: 1.5; }

        .input-wrapper { display: flex; flex-direction: column; align-items: center; margin-left: 15px; }
        .input-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
        .input-box { background: #111; border: 1px solid #333; color: white; padding: 8px; width: 105px; border-radius: 4px; text-align: center; font-size: 13px; }
        
        /* Styl pro fixní/zamknuté pole */
        .input-box[readonly] { border-color: #2b4d2e; color: var(--fine); font-weight: bold; cursor: not-allowed; background: #0f1a10; }
        .input-box:focus:not([readonly]) { border-color: var(--accent); outline: none; }

        .btn-add { background: var(--accent); color: black; border: none; width: 38px; height: 38px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 15px; align-self: flex-end; }

        /* SIDEBAR */
        .sidebar { width: 380px; background: #080808; padding: 25px; display: flex; flex-direction: column; }
        .case-entries { flex: 1; overflow-y: auto; }
        .case-item { position: relative; background: #111; padding: 15px; border-radius: 4px; margin-bottom: 12px; border-left: 3px solid var(--accent); font-size: 13px; }
        .btn-remove { position: absolute; top: 10px; right: 10px; background: transparent; color: #444; border: none; cursor: pointer; font-size: 16px; }
        .btn-remove:hover { color: var(--danger); }

        .summary-box { background: #111; padding: 20px; border-radius: 8px; border: 1px solid var(--accent); margin-top: 20px; }
        .summary-alert-box { display: none; background: rgba(255, 68, 68, 0.15); border: 1px solid var(--danger); border-radius: 6px; padding: 12px; margin-bottom: 15px; text-align: center; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: bold; font-size: 15px; }
        .btn-reset { width: 100%; background: #1a1a1a; color: var(--danger); border: 1px solid #333; padding: 14px; cursor: pointer; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="header-area">
        <div class="main-title">Policejní Databáze - Penal Code - GenK</div>
        <input type="text" id="searchInput" placeholder="Vyhledat paragraf..." onkeyup="filterLaws()">
    </div>
    <div class="laws-list" id="lawsContainer"></div>
</div>

<div class="sidebar">
    <h2 style="color:var(--accent); text-align:center; letter-spacing:3px;">PROTOKOL</h2>
    <div class="case-entries" id="caseEntries"></div>
    <div class="summary-box">
        <div id="licenseAlert" class="summary-alert-box">
            <div style="color:var(--danger); font-weight:900; font-size:12px; margin-bottom:5px;">ODEBRAT Z EVIDENCE:</div>
            <div id="docsList" style="color:#ffcccc; font-size:12px;"></div>
        </div>
        <div class="summary-row"><span>VĚZENÍ:</span> <span id="totalJail" style="color:var(--jail)">0 let</span></div>
        <div class="summary-row"><span>POKUTA:</span> <span id="totalFine" style="color:var(--fine)">0 $</span></div>
        <button class="btn-reset" onclick="location.reload()">NOVÝ PŘÍPAD</button>
    </div>
</div>

<script>
    let activeCaseItems = [];

    function analyzeLimits(text, unit) {
        // Detekce čísel (včetně těch s tečkou)
        const regex = new RegExp(`(\\d+[.\\d]*)\\s*${unit.replace('$', '\\$')}`, 'g');
        const matches = [...text.matchAll(regex)].map(m => m[1]);
        const suffix = unit === 'let' ? ' let' : ' $';

        // Rozšířená detekce rozsahu (pomlčka, slova od, do, až, po)
        const lowerText = text.toLowerCase();
        const hasHyphen = text.includes("-");
        const hasRangeWords = lowerText.includes("od ") || lowerText.includes("do ") || 
                             lowerText.includes("až ") || lowerText.includes("po ");

        // Pokud najdeme dvě čísla nebo jedno číslo s náznakem rozsahu, je to rozsah
        if (matches.length >= 2 || (matches.length === 1 && (hasHyphen || hasRangeWords))) {
            let label = matches.length >= 2 ? `${matches[0]} - ${matches[1]}${suffix}` : `max ${matches[0]}${suffix}`;
            return { type: 'range', placeholder: label, value: '' };
        } 
        
        // Pevná částka (pouze jedno číslo bez náznaku rozsahu)
        if (matches.length === 1) {
            return { type: 'fixed', placeholder: '', value: matches[0].replace(/\./g, '') };
        }
        
        return { type: 'empty', placeholder: unit === 'let' ? 'Let' : 'Pokuta', value: '' };
    }

    async function loadLaws() {
        const container = document.getElementById('lawsContainer');
        const response = await fetch('tresty.html?v=' + Date.now());
        const html = await response.text();
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        container.innerHTML = "";
        temp.querySelectorAll('.law-item').forEach((item, lIdx) => {
            const title = item.getAttribute('data-title');
            const subLines = item.querySelectorAll('.sub-line');
            let rows = "";

            subLines.forEach((line, rIdx) => {
                const textOnly = line.innerText;
                const jail = analyzeLimits(textOnly, 'let');
                const fine = analyzeLimits(textOnly, '$');

                rows += `
                    <div class="sub-row">
                        <div class="sub-text">${line.innerHTML}</div>
                        <div class="input-wrapper">
                            <span class="input-label">VĚZENÍ</span>
                            <input type="number" class="input-box" id="j_${lIdx}_${rIdx}" value="${jail.value}" placeholder="${jail.placeholder}" ${jail.type === 'fixed' ? 'readonly' : ''}>
                        </div>
                        <div class="input-wrapper">
                            <span class="input-label">POKUTA</span>
                            <input type="number" class="input-box" id="f_${lIdx}_${rIdx}" value="${fine.value}" placeholder="${fine.placeholder}" ${fine.type === 'fixed' ? 'readonly' : ''}>
                        </div>
                        <button class="btn-add" onclick="addToCase('${title}', '${textOnly.replace(/'/g,"")}', ${lIdx}, ${rIdx})">+</button>
                    </div>`;
            });

            const card = document.createElement('div');
            card.className = 'law-card';
            card.innerHTML = `<div class="law-header" onclick="this.parentElement.classList.toggle('active')"><div class="law-title">${title}</div><div>▼</div></div><div class="law-content">${rows}</div>`;
            container.appendChild(card);
        });
    }

    function addToCase(title, text, lIdx, rIdx) {
        const j = parseInt(document.getElementById(`j_${lIdx}_${rIdx}`).value) || 0;
        const f = parseInt(document.getElementById(`f_${lIdx}_${rIdx}`).value) || 0;
        if (j === 0 && f === 0) return;

        const matches = text.match(/ODEBRAT\s+([^.]+)/g);
        const docs = matches ? matches.map(m => m.replace("ODEBRAT ", "").trim()) : [];
        
        activeCaseItems.push({ id: Date.now(), title, text, jail: j, fine: f, docs });
        renderCase();
    }

    function renderCase() {
        const cont = document.getElementById('caseEntries');
        cont.innerHTML = "";
        let jTot = 0, fTot = 0, allDocs = new Set();

        activeCaseItems.forEach(item => {
            jTot += item.jail; fTot += item.fine;
            item.docs.forEach(d => allDocs.add(d));
            const div = document.createElement('div');
            div.className = 'case-item';
            div.innerHTML = `<button class="btn-remove" onclick="removeEntry(${item.id})">×</button><b>${item.title}</b><br><small>${item.jail} let | ${item.fine.toLocaleString()} $</small>`;
            cont.appendChild(div);
        });

        document.getElementById('totalJail').innerText = jTot + " let";
        document.getElementById('totalFine').innerText = fTot.toLocaleString() + " $";
        
        const alert = document.getElementById('licenseAlert');
        alert.style.display = allDocs.size > 0 ? 'block' : 'none';
        document.getElementById('docsList').innerText = Array.from(allDocs).join(", ");
    }

    function removeEntry(id) {
        activeCaseItems = activeCaseItems.filter(i => i.id !== id);
        renderCase();
    }

    function filterLaws() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.law-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none");
    }

    window.onload = loadLaws;
</script>
</body>
</html>
